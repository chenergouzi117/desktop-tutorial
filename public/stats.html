<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线考试 - 统计页面</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h2>在线考试系统</h2>
    <nav>
      <a href="/admin.html">出题页</a>
      <a href="/exam.html">答题页</a>
      <a class="active" href="/stats.html">统计页</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h3>考试统计（自动刷新）</h3>
      <p id="summary" class="muted">暂无数据</p>
      <table>
        <thead>
          <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>得分</th>
            <th>正确率</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const summary = document.getElementById('summary');
    const tbody = document.getElementById('tbody');

    async function loadStats() {
      const resp = await fetch('/api/stats');
      const data = await resp.json();

      summary.textContent = `题目数 ${data.questionsCount}，参考人数 ${data.participantsCount}，状态：${data.finished ? '已结束' : data.started ? '进行中' : '未开始'}`;

      tbody.innerHTML = '';
      data.ranking.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${item.name}</td>
          <td>${item.score}/${item.total}</td>
          <td>${item.accuracy}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadStats();
    setInterval(loadStats, 1500);
  </script>
</body>
</html>
